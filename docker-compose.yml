version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: instaura_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-instaura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-instaura_password}
      POSTGRES_DB: ${POSTGRES_DB:-instaura_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: instaura_api
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-instaura}:${POSTGRES_PASSWORD:-instaura_password}@db:5432/${POSTGRES_DB:-instaura_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-instaura_secret_777}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    ports:
      - "5000:5000"

  redis:
    image: redis:7-alpine
    container_name: instaura_redis
    restart: always
    ports:
      - "6379:6379"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: instaura_worker
    command: celery -A app.core.celery_app worker --loglevel=info
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-instaura}:${POSTGRES_PASSWORD:-instaura_password}@db:5432/${POSTGRES_DB:-instaura_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-instaura_secret_777}

volumes:
  postgres_data:
